name: Reusable CD Workflow

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      BUILD_CONFIG:
        required: true
        type: string
      PROJECT_PATH:
        required: true
        type: string
      PACKAGE_VERSION:
        required: false
        type: string
    secrets:
      NUGET_API_KEY:
        required: false

jobs:
  build:
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Resolve package metadata
        id: package
        shell: bash
        run: |
          package_id=$(dotnet msbuild "${{ inputs.PROJECT_PATH }}" -nologo -getProperty:PackageId | tail -n 1)
          echo "id=$package_id" >> "$GITHUB_OUTPUT"
      - name: Restore
        run: dotnet restore ${{inputs.PROJECT_PATH}}
      - name: Build
        shell: bash
        run: |
          version_args=()
          if [ -n "${{ inputs.PACKAGE_VERSION }}" ]; then
            version_args+=("-p:PackageVersion=${{ inputs.PACKAGE_VERSION }}")
          fi

          dotnet build --no-restore "${{ inputs.PROJECT_PATH }}" -c "${{ inputs.BUILD_CONFIG }}" "${version_args[@]}"
      - name: Pack
        shell: bash
        run: |
          version_args=()
          if [ -n "${{ inputs.PACKAGE_VERSION }}" ]; then
            version_args+=("-p:PackageVersion=${{ inputs.PACKAGE_VERSION }}")
          fi

          dotnet pack --no-build "${{ inputs.PROJECT_PATH }}" -c "${{ inputs.BUILD_CONFIG }}" -o ./artifacts "${version_args[@]}"
      - name: Publish to GitHub Packages
        shell: bash
        run: |
          shopt -s nullglob
          for package in ./artifacts/${{ steps.package.outputs.id }}.*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "${{ github.token }}" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --skip-duplicate
          done
      - name: Publish to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          for package in ./artifacts/${{ steps.package.outputs.id }}.*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
