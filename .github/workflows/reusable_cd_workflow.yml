name: Reusable CD Workflow

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      BUILD_CONFIG:
        required: true
        type: string
      PROJECT_PATH:
        required: true
        type: string
      PACKAGE_VERSION:
        required: false
        type: string
    secrets:
      NUGET_API_KEY:
        required: false

jobs:
  build:
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Validate tag package version input
        if: ${{ github.ref_type == 'tag' && inputs.PACKAGE_VERSION == '' }}
        shell: bash
        run: |
          echo "Tag-triggered releases must pass PACKAGE_VERSION. Re-running an old GitHub Actions job uses the workflow snapshot from the original run, so trigger a fresh run from the current CI workflow instead." >&2
          exit 1
      - name: Resolve package metadata
        id: package
        shell: bash
        run: |
          package_id=$(dotnet msbuild "${{ inputs.PROJECT_PATH }}" -nologo -getProperty:PackageId | tail -n 1)
          echo "id=$package_id" >> "$GITHUB_OUTPUT"
      - name: Restore
        run: dotnet restore ${{inputs.PROJECT_PATH}}
      - name: Build
        shell: bash
        run: |
          version_args=()
          if [ -n "${{ inputs.PACKAGE_VERSION }}" ]; then
            version_args+=("-p:PackageVersion=${{ inputs.PACKAGE_VERSION }}")
          fi

          dotnet build --no-restore "${{ inputs.PROJECT_PATH }}" -c "${{ inputs.BUILD_CONFIG }}" "${version_args[@]}"
      - name: Pack
        shell: bash
        run: |
          version_args=()
          if [ -n "${{ inputs.PACKAGE_VERSION }}" ]; then
            version_args+=("-p:PackageVersion=${{ inputs.PACKAGE_VERSION }}")
          fi

          dotnet pack --no-build "${{ inputs.PROJECT_PATH }}" -c "${{ inputs.BUILD_CONFIG }}" -o ./artifacts "${version_args[@]}"
      - name: Validate packaged artifacts
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./artifacts/${{ steps.package.outputs.id }}.*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No nupkg artifact was produced for ${{ steps.package.outputs.id }}." >&2
            exit 1
          fi

          if [ -n "${{ inputs.PACKAGE_VERSION }}" ]; then
            expected_package="./artifacts/${{ steps.package.outputs.id }}.${{ inputs.PACKAGE_VERSION }}.nupkg"
            if [ ! -f "$expected_package" ]; then
              echo "Expected package '$expected_package', but the produced artifacts were:" >&2
              printf '  %s\n' "${packages[@]}" >&2
              exit 1
            fi
          fi
      - name: Publish to GitHub Packages
        shell: bash
        run: |
          shopt -s nullglob
          for package in ./artifacts/${{ steps.package.outputs.id }}.*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "${{ github.token }}" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --skip-duplicate
          done
      - name: Publish to NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          for package in ./artifacts/${{ steps.package.outputs.id }}.*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
      - name: Verify package availability on NuGet.org
        if: ${{ env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          packages=(./artifacts/${{ steps.package.outputs.id }}.*.nupkg)

          for package in "${packages[@]}"; do
            filename=$(basename "$package")
            package_id='${{ steps.package.outputs.id }}'
            package_version="${filename#${package_id}.}"
            package_version="${package_version%.nupkg}"
            package_id_lower=$(echo "$package_id" | tr '[:upper:]' '[:lower:]')
            package_url="https://api.nuget.org/v3-flatcontainer/${package_id_lower}/index.json"

            verified=false
            for attempt in {1..18}; do
              response=$(curl -fsS "$package_url" || true)
              if echo "$response" | grep -Fqi "\"$package_version\""; then
                echo "Verified $package_id $package_version on NuGet.org."
                verified=true
                break
              fi

              echo "Waiting for $package_id $package_version to appear on NuGet.org (attempt $attempt/18)..."
              sleep 10
            done

            if [ "$verified" != 'true' ]; then
              echo "Package $package_id $package_version was not visible on NuGet.org after push." >&2
              exit 1
            fi
          done
