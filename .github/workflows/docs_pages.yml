name: Documentation Pages

'on':
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.github/workflows/docs_pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

env:
  DOCS_EXTERNAL_REPOSITORY: dotnetdiag/dotnetdiag.github.io
  DOCS_PUBLISH_BRANCH: gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build docs with JekyllNet
        id: jekyllnet-build
        uses: JekyllNet/action@v2.5
        with:
          source: ./docs
          destination: ./_site
          verbose: "true"

      - name: Validate external deployment credentials
        shell: bash
        run: |
          if [ -n "${{ secrets.PAGES_DEPLOY_TOKEN }}" ]; then
            echo "Using personal access token for external Pages deployment."
            exit 0
          fi

          echo "::error::External Pages deployment requires PAGES_DEPLOY_TOKEN."
          echo "::error::The token must have write access to ${DOCS_EXTERNAL_REPOSITORY}."
          exit 1

      - name: Deploy to dotnetdiag.github.io with personal access token
        if: ${{ secrets.PAGES_DEPLOY_TOKEN != '' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: ${{ env.DOCS_EXTERNAL_REPOSITORY }}
          publish_branch: ${{ env.DOCS_PUBLISH_BRANCH }}
          publish_dir: ${{ steps.jekyllnet-build.outputs.destination }}
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
